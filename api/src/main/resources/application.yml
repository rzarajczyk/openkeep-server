spring:
  application:
    name: openkeep-api
  datasource:
    url: ${OPENKEEP_DATABASE_URL:jdbc:postgresql://localhost:5432/openkeep}
    username: ${OPENKEEP_DATABASE_USER:openkeep}
    password: ${OPENKEEP_DATABASE_PASSWORD:openkeep}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
  servlet:
    multipart:
      max-file-size: ${OPENKEEP_MULTIPART_MAX_FILE_SIZE:100MB}
      max-request-size: ${OPENKEEP_MULTIPART_MAX_REQUEST_SIZE:101MB}
      file-size-threshold: 0
  jackson:
    default-property-inclusion: non_null

server:
  forward-headers-strategy: framework
  error:
    include-message: never
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

springdoc:
  api-docs:
    path: /openapi.json
  swagger-ui:
    enabled: false

openkeep:
  users-json: ${OPENKEEP_USERS_JSON:}
  token-ttl: ${OPENKEEP_TOKEN_TTL:30d}
  max-sync-limit: ${OPENKEEP_MAX_SYNC_LIMIT:200}
  login-rate-limit:
    max-attempts-per-ip: ${OPENKEEP_LOGIN_MAX_ATTEMPTS_PER_IP:10}
    max-attempts-per-login: ${OPENKEEP_LOGIN_MAX_ATTEMPTS_PER_LOGIN:5}
    window: ${OPENKEEP_LOGIN_RATE_LIMIT_WINDOW:1m}
  attachment:
    storage-root: ${OPENKEEP_ATTACHMENT_STORAGE_ROOT:./data/attachments}
    max-file-size: ${OPENKEEP_ATTACHMENT_MAX_FILE_SIZE:26214400}
    per-user-quota: ${OPENKEEP_ATTACHMENT_PER_USER_QUOTA:1073741824}
  takeout-import:
    max-upload-size: ${OPENKEEP_IMPORT_MAX_UPLOAD_SIZE:104857600}
    max-entries: ${OPENKEEP_IMPORT_MAX_ENTRIES:5000}
    max-entry-size: ${OPENKEEP_IMPORT_MAX_ENTRY_SIZE:52428800}
    max-uncompressed-size: ${OPENKEEP_IMPORT_MAX_UNCOMPRESSED_SIZE:524288000}
    max-warnings: ${OPENKEEP_IMPORT_MAX_WARNINGS:100}
